version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./minimessengervideochatapp
      dockerfile: MiniMessenger/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=VideoChatDb;User Id=sa;Password=SuperStrongPassword123!;TrustServerCertificate=True;
      - Jwt__Issuer=VideoChatApp
      - Jwt__Audience=VideoChatAppUsers
      - Jwt__
    ports:
      - "8080:8080"
    depends_on:
      - db

  web:
    build:
      context: ./minimessengervideochatappfrontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sql_data:
